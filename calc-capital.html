<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>양도소득세 계산기 - 법률 AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="shared.css?v=6">
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="location.href='calc-index.html'">← 뒤로</button>
  <h1>양도소득세 계산기</h1>
</div>

<div class="container fade-in">
  <div class="card">
    <div class="form-group">
      <label>취득가액 (원)</label>
      <input type="text" id="cg-acq-price" inputmode="numeric" placeholder="매입 가격" data-comma>
    </div>
    <div class="form-group">
      <label>양도가액 (원)</label>
      <input type="text" id="cg-tf-price" inputmode="numeric" placeholder="매도 가격" data-comma>
    </div>
    <div class="form-group">
      <label>취득일</label>
      <input type="text" id="cg-acq-date" placeholder="2020-01-15">
    </div>
    <div class="form-group">
      <label>양도일</label>
      <input type="text" id="cg-tf-date" placeholder="2026-04-12">
    </div>
    <div class="form-group">
      <label>주택 보유 유형</label>
      <select id="cg-household">
        <option value="1household1house">1세대 1주택</option>
        <option value="2houses">2주택</option>
        <option value="3plus">3주택 이상</option>
      </select>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="cg-adjust">
      <label for="cg-adjust">조정대상지역</label>
    </div>
    <div class="form-group">
      <label>거주 시작일 (1세대 1주택 시)</label>
      <input type="text" id="cg-res-start" placeholder="2020-01-15">
    </div>
    <div class="form-group">
      <label>거주 종료일</label>
      <input type="text" id="cg-res-end" placeholder="2026-04-12">
    </div>
    <h3 class="mt-16">필요경비</h3>
    <div class="form-group">
      <label>중개수수료 (원)</label>
      <input type="text" id="cg-broker" inputmode="numeric" placeholder="0" data-comma>
    </div>
    <div class="form-group">
      <label>개량비/수리비 (원)</label>
      <input type="text" id="cg-improve" inputmode="numeric" placeholder="0" data-comma>
    </div>
    <div class="form-group">
      <label>취득세 등 (원)</label>
      <input type="text" id="cg-acqtax" inputmode="numeric" placeholder="0" data-comma>
    </div>
    <button class="btn btn-primary" onclick="calcCapGains()">계산하기</button>
    <div id="cg-result"></div>
  </div>
</div>

<script src="shared.js?v=6"></script>
<script>
setupTelegramBackButton(false);

function calcCapGains() {
  var acqPrice = parseWon(document.getElementById('cg-acq-price').value);
  var tfPrice = parseWon(document.getElementById('cg-tf-price').value);
  var acqDate = document.getElementById('cg-acq-date').value.trim();
  var tfDate = document.getElementById('cg-tf-date').value.trim();
  var household = document.getElementById('cg-household').value;
  var isAdjust = document.getElementById('cg-adjust').checked;
  var resStart = document.getElementById('cg-res-start').value.trim();
  var resEnd = document.getElementById('cg-res-end').value.trim();
  var broker = parseWon(document.getElementById('cg-broker').value);
  var improve = parseWon(document.getElementById('cg-improve').value);
  var acqtax = parseWon(document.getElementById('cg-acqtax').value);

  if (acqPrice <= 0 || tfPrice <= 0) { alert('취득가액과 양도가액을 입력해주세요.'); return; }
  if (!acqDate || !tfDate) { alert('취득일과 양도일을 입력해주세요.'); return; }
  // 날짜 유효성 검증
  if (isNaN(new Date(acqDate).getTime()) || isNaN(new Date(tfDate).getTime())) {
    alert('올바른 날짜 형식(YYYY-MM-DD)으로 입력해주세요.'); return;
  }
  if (new Date(tfDate) <= new Date(acqDate)) {
    alert('양도일은 취득일 이후여야 합니다.'); return;
  }

  var expenses = broker + improve + acqtax;
  var gain = tfPrice - acqPrice - expenses;
  var holdYears = dateDiffYears(acqDate, tfDate);
  var holdDays = dateDiffDays(acqDate, tfDate);
  var startCode = 'cc_' + acqPrice + '_' + tfPrice + '_' + holdYears;
  var explainParts = [];

  var rows = [
    resultRow('양도가액', fmtWon(tfPrice) + '원'),
    resultRow('취득가액', fmtWon(acqPrice) + '원'),
    resultRow('필요경비', fmtWon(expenses) + '원'),
    resultRow('양도차익', fmtWon(gain) + '원'),
    resultRow('보유기간', holdYears + '년 (' + holdDays + '일)')
  ];

  if (gain <= 0) {
    rows.push(resultRow('양도소득세', '0원 (차익 없음)', 'total'));
    explainParts.push('양도차익이 없으므로 양도소득세가 발생하지 않습니다.');
    var consultMsg = '양도소득세 계산 결과로 상담 요청합니다.\n'
      + '━━━━━━━━━━━━━━\n'
      + '취득가액: ' + fmtWon(acqPrice) + '원\n'
      + '양도가액: ' + fmtWon(tfPrice) + '원\n'
      + '필요경비: ' + fmtWon(expenses) + '원\n'
      + '양도차익: ' + fmtWon(gain) + '원 (차익 없음)\n'
      + '보유기간: ' + holdYears + '년\n'
      + '양도소득세: 0원\n'
      + '━━━━━━━━━━━━━━\n'
      + '다른 절세 방법이 있는지 알려주세요.';
    document.getElementById('cg-result').innerHTML = resultBox(rows, undefined, getLawRef('capitalGainsTax')) + explanationBox(explainParts.join(' ')) + consultButton(consultMsg, startCode);
    return;
  }

  var is1house = (household === '1household1house');
  var totalTax = 0;

  // Config values for capital gains tax
  var cgCfg = TAX_CONFIG ? TAX_CONFIG.capitalGainsTax : null;
  var oneHouseExemptLimit = cgCfg ? cgCfg.oneHouseExemptionLimit : 1200000000;
  var cgBasicDeduct = cgCfg ? cgCfg.basicDeduction : 2500000;
  var shortRateUnder1 = cgCfg ? cgCfg.shortTermRates.under1Year : 70;
  var shortRateUnder2 = cgCfg ? cgCfg.shortTermRates.under2Years : 60;
  var ltGenRatePerYear = cgCfg ? cgCfg.longTermGeneral.ratePerYear : 2;
  var ltGenMaxRate = cgCfg ? cgCfg.longTermGeneral.maxRate : 30;
  var lt1hHoldPerYear = cgCfg ? cgCfg.longTerm1House.holdingRatePerYear : 4;
  var lt1hHoldMax = cgCfg ? cgCfg.longTerm1House.holdingMaxRate : 40;
  var lt1hResPerYear = cgCfg ? cgCfg.longTerm1House.residenceRatePerYear : 4;
  var lt1hResMax = cgCfg ? cgCfg.longTerm1House.residenceMaxRate : 40;
  var multiSurcharge2 = cgCfg ? cgCfg.multiHouseSurcharge.twoHouses : 20;
  var multiSurcharge3 = cgCfg ? cgCfg.multiHouseSurcharge.threeOrMore : 30;
  var surchargeExemptEndStr = cgCfg ? cgCfg.multiHouseSurcharge.exemptionEnd : '2026-05-09';
  var adjAreaDate = cgCfg ? cgCfg.residenceRequirement.adjustmentAreaDate : '2017-08-03';
  var adjReqYears = cgCfg ? cgCfg.residenceRequirement.requiredYears : 2;

  // 조정대상지역 거주 요건
  var isAdjust = document.getElementById('cg-adjust').checked;
  var resStart = document.getElementById('cg-res-start').value.trim();
  var resEnd = document.getElementById('cg-res-end').value.trim();
  var resYearsForExempt = (resStart && resEnd) ? dateDiffYears(resStart, resEnd) : 0;
  var needsResidence = isAdjust && acqDate >= adjAreaDate;
  var meetsResidence = !needsResidence || resYearsForExempt >= adjReqYears;

  if (is1house && holdYears >= 2 && meetsResidence) {
    if (tfPrice <= oneHouseExemptLimit) {
      var exemptNote = needsResidence ? ' (2년 보유 + 2년 거주, 12억 이하)' : ' (2년 이상 보유, 12억 이하)';
      rows.push(resultRow('비과세', '1세대 1주택 비과세' + exemptNote));
      rows.push(resultRow('양도소득세', '0원', 'total'));
      explainParts.push('1세대 1주택 비과세 요건을 충족합니다.' + (needsResidence ? ' 조정대상지역 2017.8.3 이후 취득으로 2년 거주 요건도 충족되었습니다.' : ''));
      var consultMsg = '양도소득세 계산 결과로 상담 요청합니다.\n'
        + '━━━━━━━━━━━━━━\n'
        + '취득가액: ' + fmtWon(acqPrice) + '원\n'
        + '양도가액: ' + fmtWon(tfPrice) + '원\n'
        + '필요경비: ' + fmtWon(expenses) + '원\n'
        + '양도차익: ' + fmtWon(gain) + '원\n'
        + '보유기간: ' + holdYears + '년\n'
        + '비과세: 1세대 1주택 (2년 이상 보유, 12억 이하)\n'
        + '양도소득세: 0원\n'
        + '━━━━━━━━━━━━━━\n'
        + '다른 세금 이슈가 있는지 확인해주세요.';
      document.getElementById('cg-result').innerHTML = resultBox(rows, undefined, getLawRef('capitalGainsTax')) + explanationBox(explainParts.join(' ')) + consultButton(consultMsg, startCode);
      return;
    }
    var taxableGain = Math.floor(gain * (tfPrice - oneHouseExemptLimit) / tfPrice);
    var pct = Math.round((tfPrice - oneHouseExemptLimit) * 100 / tfPrice);
    rows.push(resultRow('12억 초과분 과세', '양도차익의 ' + pct + '%'));
    gain = taxableGain;
    rows.push(resultRow('과세 양도차익', fmtWon(gain) + '원'));
    explainParts.push('1세대 1주택이지만 양도가액이 12억원을 초과하므로, 초과분(' + pct + '%)에 대해서만 과세됩니다.');
  }

  var ltRate = 0;
  if (is1house && holdYears >= 3) {
    var holdRate = Math.min(holdYears * lt1hHoldPerYear, lt1hHoldMax);
    var resYears = 0;
    if (resStart && resEnd) resYears = dateDiffYears(resStart, resEnd);
    var resRate = Math.min(resYears * lt1hResPerYear, lt1hResMax);
    ltRate = holdRate + resRate;
    rows.push(resultRow('보유공제율', holdRate + '% (보유 ' + holdYears + '년)'));
    if (resYears > 0) rows.push(resultRow('거주공제율', resRate + '% (거주 ' + resYears + '년)'));
    rows.push(resultRow('장기보유특별공제율', ltRate + '%'));
    explainParts.push('1세대 1주택 장기보유특별공제: 보유 ' + holdRate + '% + 거주 ' + resRate + '% = ' + ltRate + '% 적용.');
  } else if (!is1house && holdYears >= 3) {
    ltRate = Math.min(holdYears * ltGenRatePerYear, ltGenMaxRate);
    rows.push(resultRow('장기보유특별공제율', ltRate + '% (보유 ' + holdYears + '년)'));
    explainParts.push('일반 장기보유특별공제 ' + ltRate + '% 적용 (연 2%, 최대 30%).');
  }

  var ltDeduction = 0;
  if (ltRate > 0) {
    ltDeduction = Math.floor(gain * ltRate / 100);
    rows.push(resultRow('장기보유특별공제액', fmtWon(ltDeduction) + '원'));
  }

  var afterLt = gain - ltDeduction;
  var basicDeduct = cgBasicDeduct;
  var taxable = Math.max(0, afterLt - basicDeduct);
  rows.push(resultRow('기본공제', fmtWon(basicDeduct) + '원'));
  rows.push(resultRow('과세표준', fmtWon(taxable) + '원'));

  // 단기 보유: 역년 기준 (일수가 아닌 년 단위)
  var finalTax = 0;
  if (holdYears < 1) {
    finalTax = Math.floor(taxable * shortRateUnder1 / 100);
    rows.push(resultRow('단기 보유 세율', shortRateUnder1 + '% (1년 미만)'));
    explainParts.push('1년 미만 보유로 ' + shortRateUnder1 + '% 단기 세율이 적용됩니다 (2021년 개정).');
  } else if (holdYears < 2) {
    finalTax = Math.floor(taxable * shortRateUnder2 / 100);
    rows.push(resultRow('단기 보유 세율', shortRateUnder2 + '% (2년 미만)'));
    explainParts.push('2년 미만 보유로 ' + shortRateUnder2 + '% 단기 세율이 적용됩니다 (2021년 개정).');
  } else {
    var tfDateObj = new Date(tfDate);
    var surchargeExemptEnd = new Date(surchargeExemptEndStr);
    var surcharge = 0;
    if (isAdjust && tfDateObj > surchargeExemptEnd) {
      if (household === '2houses') surcharge = multiSurcharge2;
      else if (household === '3plus') surcharge = multiSurcharge3;
    }

    var r = applyIncomeTax(taxable);
    finalTax = r.tax;
    rows.push(resultRow('기본세율', r.rate + '%'));
    if (surcharge > 0) {
      var surTax = Math.floor(taxable * surcharge / 100);
      finalTax += surTax;
      rows.push(resultRow('중과세율', '+' + surcharge + '% (조정지역)'));
      rows.push(resultRow('중과세액', fmtWon(surTax) + '원'));
      explainParts.push('조정대상지역 중과세율 +' + surcharge + '%가 추가 적용됩니다.');
    }
    if (!surcharge && !explainParts.length) {
      explainParts.push('기본 소득세율 ' + r.rate + '%가 적용됩니다.');
    }
  }

  var localTax = Math.floor(finalTax * 10 / 100);
  rows.push(resultRow('양도소득세', fmtWon(finalTax) + '원'));
  rows.push(resultRow('지방소득세 (10%)', fmtWon(localTax) + '원'));
  rows.push(resultRow('총 납부세액', fmtWon(finalTax + localTax) + '원', 'total'));

  explainParts.push('양도일이 속하는 달의 말일부터 2개월 이내에 예정신고하고, 다음 해 5월에 확정신고해야 합니다.');

  var consultMsg = '양도소득세 계산 결과로 상담 요청합니다.\n'
    + '━━━━━━━━━━━━━━\n'
    + '취득가액: ' + fmtWon(acqPrice) + '원\n'
    + '양도가액: ' + fmtWon(tfPrice) + '원\n'
    + '필요경비: ' + fmtWon(expenses) + '원\n'
    + '양도차익: ' + fmtWon(gain) + '원\n'
    + '보유기간: ' + holdYears + '년\n'
    + (ltRate > 0 ? '장기보유특별공제율: ' + ltRate + '%\n' : '')
    + (ltRate > 0 ? '장기보유특별공제액: ' + fmtWon(ltDeduction) + '원\n' : '')
    + '기본공제: ' + fmtWon(basicDeduct) + '원\n'
    + '과세표준: ' + fmtWon(taxable) + '원\n'
    + '양도소득세: ' + fmtWon(finalTax) + '원\n'
    + '지방소득세: ' + fmtWon(localTax) + '원\n'
    + '총 납부세액: ' + fmtWon(finalTax + localTax) + '원\n'
    + '━━━━━━━━━━━━━━\n'
    + '비과세/감면 가능한지 알려주세요.';

  document.getElementById('cg-result').innerHTML =
    resultBox(rows, undefined, getLawRef('capitalGainsTax')) + explanationBox(explainParts.join(' ')) + consultButton(consultMsg, startCode);
}
</script>
</body>
</html>
