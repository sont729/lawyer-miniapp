<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>상속세 계산기 - 법률 AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="shared.css?v=6">
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="location.href='calc-index.html'">← 뒤로</button>
  <h1>상속세 계산기</h1>
</div>

<div class="container fade-in">
  <div class="card">
    <div class="form-group">
      <label>총 상속재산 (원)</label>
      <input type="text" id="inh-estate" inputmode="numeric" placeholder="예: 1,000,000,000" data-comma>
    </div>
    <div class="checkbox-group">
      <input type="checkbox" id="inh-spouse" checked onchange="toggleSpouseShare()">
      <label for="inh-spouse">배우자 생존</label>
    </div>
    <div id="inh-spouse-opts">
      <div class="form-group">
        <label>배우자 실제 상속분 (원, 선택)</label>
        <input type="text" id="inh-spouse-share" inputmode="numeric" placeholder="미입력 시 최소 5억 적용" data-comma>
        <div class="hint">실제 상속분 입력 시 최대 30억까지 공제 (법정상속분 한도)</div>
      </div>
    </div>
    <div class="form-group">
      <label>자녀 수</label>
      <select id="inh-children">
        <option value="0">0명</option>
        <option value="1">1명</option>
        <option value="2" selected>2명</option>
        <option value="3">3명</option>
        <option value="4">4명</option>
        <option value="5">5명 이상</option>
      </select>
    </div>
    <div class="form-group">
      <label>장례비용 (원, 직접비용 최대 1,000만원 + 봉안 500만원)</label>
      <input type="text" id="inh-funeral" inputmode="numeric" placeholder="예: 10,000,000" data-comma>
    </div>
    <button class="btn btn-primary" onclick="calcInherit()">계산하기</button>
    <div id="inh-result"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>홈</span></a>
  <a href="consult.html"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg><span>상담</span></a>
  <a href="calc-index.html" class="active"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 14h-2v-4H7v-2h6V7h2v4h4v2h-4v4z"/></svg><span>세금계산</span></a>
  <a href="lawsuit.html"><svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg><span>소송비용</span></a>
  <a href="docs.html"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg><span>문서작성</span></a>
</nav>

<script src="shared.js?v=6"></script>
<script>
setupTelegramBackButton(false);

function toggleSpouseShare() {
  var show = document.getElementById('inh-spouse').checked;
  document.getElementById('inh-spouse-opts').style.display = show ? 'block' : 'none';
}
toggleSpouseShare();

function calcInherit() {
  var estate = parseWon(document.getElementById('inh-estate').value);
  var spouseAlive = document.getElementById('inh-spouse').checked;
  var numChildren = parseInt(document.getElementById('inh-children').value, 10);
  var funeral = parseWon(document.getElementById('inh-funeral').value);
  if (estate <= 0) { alert('상속재산을 입력해주세요.'); return; }

  var funeralMax = getConfig('inheritanceTax.funeralCostMax', 15000000);
  var funeralDeduct = Math.min(funeral, funeralMax);
  if (funeralDeduct < 5000000) funeralDeduct = 5000000; // 시행령 제9조: 500만원 미만이면 500만원

  var basicDeduct = getConfig('inheritanceTax.basicDeduction', 200000000);
  var childDeductPer = getConfig('inheritanceTax.childDeductionPer', 50000000);
  var childDeduct = childDeductPer * numChildren;
  var itemizedTotal = basicDeduct + childDeduct;
  var lumpSum = getConfig('inheritanceTax.lumpSumDeduction', 500000000);
  var personalDeduct = Math.max(itemizedTotal, lumpSum);
  var spouseDeduct = 0;
  var spouseShareInput = parseWon(document.getElementById('inh-spouse-share').value);
  if (spouseAlive) {
    // 법정상속비율: 배우자 1.5 : 자녀 각 1
    // 자녀 0명이면 배우자 단독상속으로 계산 (직계존속 유무 미입력)
    // 주의: 부모가 생존하면 배우자+부모 공동상속 (민법 제1003조)
    var spouseLegalRatio = numChildren > 0 ? 1.5 / (1.5 + numChildren) : 1;
    var spouseLegalShare = Math.floor(estate * spouseLegalRatio);
    var spouseMin = 500000000; // 최소 5억
    var spouseMax = 3000000000; // 최대 30억
    if (spouseShareInput > 0) {
      // 실제 상속분 입력 시: min(실제상속분, 법정상속분) 범위, 최소 5억 최대 30억
      spouseDeduct = Math.min(spouseShareInput, spouseLegalShare);
      spouseDeduct = Math.max(spouseDeduct, spouseMin);
      spouseDeduct = Math.min(spouseDeduct, spouseMax);
    } else {
      spouseDeduct = spouseMin;
    }
  }
  var totalDeduct = personalDeduct + spouseDeduct + funeralDeduct;
  var taxable = Math.max(0, estate - totalDeduct);
  var r = applyGiftTax(taxable);

  var rows = [
    resultRow('총 상속재산', fmtWon(estate) + '원'),
    resultRow('기본공제', fmtWon(basicDeduct) + '원'),
    resultRow('자녀공제 (' + numChildren + '명)', fmtWon(childDeduct) + '원'),
    resultRow('일괄공제', fmtWon(lumpSum) + '원'),
    resultRow('적용 인적공제', fmtWon(personalDeduct) + '원 (큰 값 적용)')
  ];
  if (spouseAlive) {
    var spouseDetail = fmtWon(spouseDeduct) + '원';
    if (spouseShareInput > 0) spouseDetail += ' (실제 상속분 기준)';
    else spouseDetail += ' (최소 공제)';
    rows.push(resultRow('배우자 공제', spouseDetail));
  }
  rows.push(resultRow('장례비 공제', fmtWon(funeralDeduct) + '원'));
  rows.push(resultRow('총 공제', fmtWon(totalDeduct) + '원'));
  rows.push(resultRow('과세표준', fmtWon(taxable) + '원'));
  rows.push(resultRow('적용 세율', r.rate + '%'));
  rows.push(resultRow('누진공제', fmtWon(r.deduct) + '원'));
  rows.push(resultRow('상속세', fmtWon(r.tax) + '원', 'total'));

  var explainText = '상속재산 ' + fmtWon(estate) + '원에서 총 ' + fmtWon(totalDeduct) +
    '원 공제 시 과세표준은 ' + fmtWon(taxable) + '원입니다. ' +
    '상속개시일(사망일)이 속하는 달의 말일부터 6개월 이내 신고해야 합니다. ' +
    '기본공제(' + fmtWon(basicDeduct) + '원)와 자녀공제(' + fmtWon(childDeduct) + '원)의 합이 일괄공제(' + fmtWon(lumpSum) + '원)보다 ' +
    (itemizedTotal >= lumpSum ? '크므로 항목별 공제가' : '작으므로 일괄공제가') + ' 적용되었습니다.';

  var startCode = 'ci_' + estate + '_' + (document.getElementById('inh-spouse').checked?1:0) + '_' + numChildren;
  var consultMsg = '상속세 계산 결과로 상담 요청합니다.\n'
    + '━━━━━━━━━━━━━━\n'
    + '상속재산: ' + fmtWon(estate) + '원\n'
    + '기본공제: ' + fmtWon(basicDeduct) + '원\n'
    + '자녀공제 (' + numChildren + '명): ' + fmtWon(childDeduct) + '원\n'
    + '일괄공제: ' + fmtWon(lumpSum) + '원\n'
    + '적용 인적공제: ' + fmtWon(personalDeduct) + '원\n'
    + (spouseAlive ? '배우자 공제: ' + fmtWon(spouseDeduct) + '원' + (spouseShareInput > 0 ? ' (실제 상속분 ' + fmtWon(spouseShareInput) + '원)' : ' (최소 공제)') + '\n' : '')
    + '장례비 공제: ' + fmtWon(funeralDeduct) + '원\n'
    + '총 공제: ' + fmtWon(totalDeduct) + '원\n'
    + '과세표준: ' + fmtWon(taxable) + '원\n'
    + '세율: ' + r.rate + '% (누진공제 ' + fmtWon(r.deduct) + '원)\n'
    + '산출세액: ' + fmtWon(r.tax) + '원\n'
    + '━━━━━━━━━━━━━━\n'
    + '절세 방법이나 추가 공제가 가능한지 알려주세요.';

  var tips = '';
  if (spouseAlive && numChildren === 0) {
    tips += tipBox('<strong>부모(직계존속)가 생존해 계신가요?</strong> 자녀가 없어도 피상속인의 부모가 생존하면 배우자와 공동상속(배우자 1.5 : 부모 각 1)이 됩니다. 이 경우 배우자공제 한도가 달라질 수 있으니 상담에서 정확히 확인하세요.');
  }
  tips += tipBox('<strong>금융재산(예금/주식)이 포함되어 있나요?</strong> 최대 2억원 추가 공제가 가능합니다. 10년 이상 동거한 자녀가 있다면 최대 6억원 동거주택 공제도 받을 수 있습니다.');

  document.getElementById('inh-result').innerHTML =
    resultBox(rows, undefined, getLawRef('inheritanceTax')) + explanationBox(explainText) + tips + consultButton(consultMsg, startCode);
}
</script>
</body>
</html>
