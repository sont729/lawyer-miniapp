<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>월급 실수령액 계산기 - 법률 AI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="shared.css?v=6">
</head>
<body>

<div class="page-header">
  <button class="back-btn" onclick="location.href='calc-index.html'">← 뒤로</button>
  <h1>월급 실수령액 계산기</h1>
</div>

<div class="container fade-in">
  <div class="card">
    <div class="form-group">
      <label>급여 입력 방식</label>
      <div class="radio-group" id="salary-type">
        <div class="radio-pill active" onclick="setSalaryType('monthly',this)">월급</div>
        <div class="radio-pill" onclick="setSalaryType('annual',this)">연봉</div>
      </div>
    </div>
    <div class="form-group">
      <label id="salary-label">월 급여 (원, 세전)</label>
      <input type="text" id="sal-amount" inputmode="numeric" placeholder="예: 3,500,000" data-comma>
    </div>
    <div class="form-group">
      <label>비과세 항목 (원/월)</label>
      <input type="text" id="sal-nontax" inputmode="numeric" placeholder="200,000" value="200,000" data-comma>
      <div class="hint">식대 등 비과세 수당 (기본 20만원)</div>
    </div>
    <div class="form-group">
      <label>부양가족 수 (본인 포함)</label>
      <select id="sal-dependents">
        <option value="1" selected>1명 (본인만)</option>
        <option value="2">2명</option>
        <option value="3">3명</option>
        <option value="4">4명</option>
        <option value="5">5명 이상</option>
      </select>
      <div class="hint">배우자·자녀 등 부양가족이 많을수록 세금이 줄어듭니다</div>
    </div>
    <button class="btn btn-primary" onclick="calcSalary()">계산하기</button>
    <div id="sal-result"></div>
  </div>
</div>

<nav class="bottom-nav">

  <a href="calc-index.html" class="active"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4 14h-2v-4H7v-2h6V7h2v4h4v2h-4v4z"/></svg><span>세금계산</span></a>
  <a href="lawsuit.html"><svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg><span>소송비용</span></a>
  <a href="docs.html"><svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/></svg><span>문서작성</span></a>
</nav>

<script src="shared.js?v=10"></script>
<script>
setupTelegramBackButton(false);

var salaryMode = 'monthly';

function setSalaryType(mode, el) {
  salaryMode = mode;
  document.querySelectorAll('#salary-type .radio-pill').forEach(function(p) { p.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('salary-label').textContent = mode === 'monthly' ? '월 급여 (원, 세전)' : '연봉 (원, 세전)';
  document.getElementById('sal-amount').placeholder = mode === 'monthly' ? '예: 3,500,000' : '예: 42,000,000';
}

function calcSalary() {
  var rawAmount = parseWon(document.getElementById('sal-amount').value);
  var nonTaxable = parseWon(document.getElementById('sal-nontax').value);
  if (rawAmount <= 0) { alert('급여를 입력해주세요.'); return; }

  var monthly = salaryMode === 'annual' ? Math.floor(rawAmount / 12) : rawAmount;
  var annual = salaryMode === 'annual' ? rawAmount : monthly * 12;

  // 4대 보험 (employee share) - from config with fallback
  var cfg = TAX_CONFIG ? TAX_CONFIG.salary.insurance : null;
  var pensionCap = cfg ? cfg.nationalPension.monthlyCapBase : 6370000;
  var pensionFrac = cfg ? cfg.nationalPension.rateFraction : [475, 10000];
  var healthFrac = cfg ? cfg.healthInsurance.rateFraction : [3595, 100000];
  var longCareFrac = cfg ? cfg.longTermCare.rateFraction : [1314, 10000];
  var employFrac = cfg ? cfg.employmentInsurance.rateFraction : [9, 1000];

  // 4대보험 기준소득: 비과세 제외 (국민연금법 시행령 제5조, 건강보험법 시행령 제33조)
  var insuranceBase = Math.max(0, monthly - nonTaxable);
  var pensionFloor = 400000; // 국민연금 하한액 (2025.7~2026.6)
  var pensionBase = Math.max(pensionFloor, Math.min(insuranceBase, pensionCap));
  var pension = Math.floor(pensionBase * pensionFrac[0] / pensionFrac[1]);
  // 건강보험 보수월액 상한 (2026년 기준 약 1.2억)
  var healthCap = 119625120;
  var healthBase = Math.min(insuranceBase, healthCap);
  var health = Math.floor(healthBase * healthFrac[0] / healthFrac[1]);
  var longCare = Math.floor(health * longCareFrac[0] / longCareFrac[1]);
  var employ = Math.floor(insuranceBase * employFrac[0] / employFrac[1]);
  var totalInsurance = pension + health + longCare + employ;

  // Simplified income tax calculation
  var taxableMonthly = Math.max(0, monthly - nonTaxable - totalInsurance);
  var annualTaxable = taxableMonthly * 12;

  // Earned income deduction - from config with fallback
  var eidBrackets = getConfig('salary.earnedIncomeDeduction.brackets', null);
  var earnedDeduct = 0;
  if (eidBrackets) {
    for (var ei = 0; ei < eidBrackets.length; ei++) {
      var eb = eidBrackets[ei];
      var ebLimit = eb.limit || Infinity;
      if (annualTaxable <= ebLimit) {
        var ebBase = eb.baseDeduct || 0;
        var prevLimit = ei > 0 ? (eidBrackets[ei - 1].limit || 0) : 0;
        earnedDeduct = ebBase + Math.floor((annualTaxable - prevLimit) * eb.rate / 100);
        break;
      }
    }
  } else {
    if (annualTaxable <= 5000000) {
      earnedDeduct = Math.floor(annualTaxable * 70 / 100);
    } else if (annualTaxable <= 15000000) {
      earnedDeduct = 3500000 + Math.floor((annualTaxable - 5000000) * 40 / 100);
    } else if (annualTaxable <= 45000000) {
      earnedDeduct = 7500000 + Math.floor((annualTaxable - 15000000) * 15 / 100);
    } else if (annualTaxable <= 100000000) {
      earnedDeduct = 12000000 + Math.floor((annualTaxable - 45000000) * 5 / 100);
    } else {
      earnedDeduct = 14750000 + Math.floor((annualTaxable - 100000000) * 2 / 100);
    }
  }

  // 소득세법 제47조 제2항: 근로소득공제 한도 2,000만원
  if (earnedDeduct > 20000000) earnedDeduct = 20000000;

  var dependents = parseInt(document.getElementById('sal-dependents').value, 10) || 1;
  var personalDeductAmt = getConfig('incomeTax.personalDeductionPerPerson', 1500000) * dependents;
  var annualTaxBase = Math.max(0, annualTaxable - earnedDeduct - personalDeductAmt);
  var r = applyIncomeTax(annualTaxBase);
  // 근로소득세액공제 (소득세법 제59조)
  var earnedTaxCredit = 0;
  if (r.tax <= 1300000) {
    earnedTaxCredit = Math.floor(r.tax * 55 / 100);
  } else {
    earnedTaxCredit = 715000 + Math.floor((r.tax - 1300000) * 30 / 100);
  }
  // 총급여별 한도
  if (annual <= 33000000) earnedTaxCredit = Math.min(earnedTaxCredit, 740000);
  else if (annual <= 70000000) earnedTaxCredit = Math.min(earnedTaxCredit, 660000);
  else earnedTaxCredit = Math.min(earnedTaxCredit, 500000);

  // 표준세액공제 (근로소득자 13만원)
  var stdTaxCredit = 130000;
  var annualTaxAfterCredit = Math.max(0, r.tax - earnedTaxCredit - stdTaxCredit);
  var monthlyIncomeTax = Math.floor(annualTaxAfterCredit / 12);
  var monthlyLocalTax = Math.floor(monthlyIncomeTax * 10 / 100);
  var totalDeductions = totalInsurance + monthlyIncomeTax + monthlyLocalTax;
  var takeHome = monthly - totalDeductions;

  var rows = [];
  // Header section
  rows.push(resultRow('급여 총액', fmtWon(monthly) + '원/월', 'section-title'));
  if (salaryMode === 'annual') {
    rows.push(resultRow('연봉', fmtWon(annual) + '원'));
  }
  rows.push(resultRow('비과세 수당', fmtWon(nonTaxable) + '원'));
  rows.push(resultRow('', ''));

  // Insurance section
  rows.push(resultRow('4대보험 공제', '', 'section-title'));
  var pctPension = cfg ? (cfg.nationalPension.rateFraction[0] / (cfg.nationalPension.rateFraction[1] / 100)).toFixed(2) : '4.75';
  var pctHealth = cfg ? (cfg.healthInsurance.rateFraction[0] / (cfg.healthInsurance.rateFraction[1] / 100)).toFixed(3) : '3.595';
  var pctLongCare = cfg ? (cfg.longTermCare.rateFraction[0] / (cfg.longTermCare.rateFraction[1] / 100)).toFixed(2) : '13.14';
  var pctEmploy = cfg ? (cfg.employmentInsurance.rateFraction[0] / (cfg.employmentInsurance.rateFraction[1] / 100)).toFixed(1) : '0.9';
  rows.push(resultRow('국민연금 (' + pctPension + '%)', '-' + fmtWon(pension) + '원'));
  rows.push(resultRow('건강보험 (' + pctHealth + '%)', '-' + fmtWon(health) + '원'));
  rows.push(resultRow('장기요양보험 (' + pctLongCare + '%)', '-' + fmtWon(longCare) + '원'));
  rows.push(resultRow('고용보험 (' + pctEmploy + '%)', '-' + fmtWon(employ) + '원'));
  rows.push(resultRow('4대보험 소계', '-' + fmtWon(totalInsurance) + '원'));
  rows.push(resultRow('', ''));

  // Tax section
  rows.push(resultRow('세금 공제', '', 'section-title'));
  rows.push(resultRow('근로소득세 (추정)', '-' + fmtWon(monthlyIncomeTax) + '원'));
  rows.push(resultRow('지방소득세 (10%)', '-' + fmtWon(monthlyLocalTax) + '원'));
  rows.push(resultRow('', ''));

  // Total
  rows.push(resultRow('총 공제액', '-' + fmtWon(totalDeductions) + '원'));
  rows.push(resultRow('실수령액', fmtWon(takeHome) + '원', 'total'));

  var explainText = '월 급여 ' + fmtWon(monthly) + '원에서 4대보험 ' + fmtWon(totalInsurance) +
    '원과 세금 ' + fmtWon(monthlyIncomeTax + monthlyLocalTax) + '원 공제 후 실수령 ' + fmtWon(takeHome) + '원입니다. ' +
    '4대보험은 사업주도 동일 부담(산재보험은 사업주 전액). ' +
    '국민연금 상한액은 월 ' + fmtWon(pensionCap) + '원이며, 비과세 수당(식대 등)은 소득세 계산에서 제외됩니다. 근로소득세는 간이세액표가 아닌 연간 환산 추정치입니다.';

  var startCode = 'cs_' + monthly + '_' + nonTaxable;
  var consultMsg = '월급 실수령액 계산 결과로 상담 요청합니다.\n'
    + '━━━━━━━━━━━━━━\n'
    + '월 급여: ' + fmtWon(monthly) + '원\n'
    + '비과세 수당: ' + fmtWon(nonTaxable) + '원\n'
    + '국민연금: ' + fmtWon(pension) + '원\n'
    + '건강보험: ' + fmtWon(health) + '원\n'
    + '장기요양보험: ' + fmtWon(longCare) + '원\n'
    + '고용보험: ' + fmtWon(employ) + '원\n'
    + '4대보험 합계: ' + fmtWon(totalInsurance) + '원\n'
    + '근로소득세: ' + fmtWon(monthlyIncomeTax) + '원\n'
    + '지방소득세: ' + fmtWon(monthlyLocalTax) + '원\n'
    + '총 공제액: ' + fmtWon(totalDeductions) + '원\n'
    + '실수령액: ' + fmtWon(takeHome) + '원\n'
    + '━━━━━━━━━━━━━━\n'
    + '절세/공제 더 받을 수 있는 방법 알려주세요.';

  var tips = tipBox('<strong>만 60세 이상이신가요?</strong> 국민연금 가입 의무가 면제되어 실수령액이 더 높습니다. 상담에서 정확한 금액을 확인해보세요.');

  document.getElementById('sal-result').innerHTML =
    resultBox(rows, undefined, getLawRef('salary')) + explanationBox(explainText) + tips + consultButton(consultMsg, startCode);
}
</script>
</body>
</html>
