<div class="container fade-in">
  <p class="subtitle">민사소송등인지법, 민사소송비용법 근거</p>
  <div class="card">
    <div class="form-group">
      <label>소송 목적물 가액 (원)</label>
      <input type="text" id="lit-amount" inputmode="numeric" placeholder="예: 50,000,000" data-comma>
    </div>
    <div class="form-group">
      <label>당사자 수 (원고+피고)</label>
      <select id="lit-parties">
        <option value="2" selected>2명 (1:1)</option>
        <option value="3">3명</option>
        <option value="4">4명</option>
        <option value="5">5명</option>
        <option value="6">6명 이상</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="calcLitigation()">계산하기</button>
    <div id="lit-result"></div>
  </div>
</div>

<script src="shared.js?v=6"></script>
<script>
setupTelegramBackButton(false);

function calcLitigation() {
  var amount = parseWon(document.getElementById('lit-amount').value);
  var parties = parseInt(document.getElementById('lit-parties').value, 10);
  if (amount <= 0) { alert('소송 목적물 가액을 입력해주세요.'); return; }

  // Stamp fee (1심 인지대) - from config with fallback
  var litCfg = TAX_CONFIG ? TAX_CONFIG.litigationCost : null;
  var stampBrackets = litCfg ? litCfg.stampFeeBrackets : null;
  var stampFee = 0;
  if (stampBrackets) {
    for (var si = 0; si < stampBrackets.length; si++) {
      var sb = stampBrackets[si];
      var sbLimit = sb.limit || Infinity;
      if (amount <= sbLimit) {
        stampFee = Math.floor(amount * sb.rateNum / sb.rateDen) + sb.add;
        break;
      }
    }
  } else {
    if (amount <= 10000000) {
      stampFee = Math.floor(amount * 5 / 1000);
    } else if (amount <= 100000000) {
      stampFee = Math.floor(amount * 45 / 10000) + 5000;
    } else if (amount <= 1000000000) {
      stampFee = Math.floor(amount * 4 / 1000) + 55000;
    } else {
      stampFee = Math.floor(amount * 35 / 10000) + 555000;
    }
  }
  stampFee = Math.floor(stampFee / 1000) * 1000;
  if (stampFee < 1000) stampFee = 1000;

  // Small claims override
  if (amount <= 30000000) {
    var smallFees = [
      [1000000, 2000], [2000000, 3000], [3000000, 5000],
      [5000000, 5000], [10000000, 10000], [15000000, 15000],
      [20000000, 15000], [25000000, 20000], [30000000, 25000]
    ];
    for (var i = 0; i < smallFees.length; i++) {
      if (amount <= smallFees[i][0]) { stampFee = smallFees[i][1]; break; }
    }
  }

  var appealMult = litCfg ? litCfg.appealMultiplier : 1.5;
  var cassationMult = litCfg ? litCfg.cassationMultiplier : 2.0;
  var appealStamp = Math.floor(stampFee * appealMult);
  appealStamp = Math.floor(appealStamp / 1000) * 1000;
  var cassationStamp = Math.floor(stampFee * cassationMult);
  cassationStamp = Math.floor(cassationStamp / 1000) * 1000;

  var serviceFeePerSend = litCfg ? litCfg.serviceFeePerSend : 5200;
  var sendsPerParty = litCfg ? litCfg.sendsPerParty : 15;
  var serviceFee = parties * sendsPerParty * serviceFeePerSend;

  var lawyerMin = 0, lawyerMax = 0;
  if (amount <= 20000000) { lawyerMin = 500000; lawyerMax = 3000000; }
  else if (amount <= 50000000) { lawyerMin = 3000000; lawyerMax = 5000000; }
  else if (amount <= 100000000) { lawyerMin = 5000000; lawyerMax = 10000000; }
  else if (amount <= 300000000) { lawyerMin = 10000000; lawyerMax = 20000000; }
  else if (amount <= 500000000) { lawyerMin = 15000000; lawyerMax = 30000000; }
  else if (amount <= 1000000000) { lawyerMin = 20000000; lawyerMax = 50000000; }
  else { lawyerMin = 30000000; lawyerMax = 80000000; }

  var totalMin = stampFee + serviceFee;
  var isSmall = (amount <= 30000000);

  var rows = [
    resultRow('소송 목적물 가액', fmtWon(amount) + '원'),
    resultRow('당사자 수', parties + '명'),
    resultRow('', ''),
    resultRow('인지대 (1심)', fmtWon(stampFee) + '원'),
    resultRow('인지대 (항소심, 1.5배)', fmtWon(appealStamp) + '원'),
    resultRow('인지대 (상고심, 2배)', fmtWon(cassationStamp) + '원'),
    resultRow('송달료', fmtWon(serviceFee) + '원'),
    resultRow('', ''),
    resultRow('변호사 비용 (참고)', fmtWon(lawyerMin) + ' ~ ' + fmtWon(lawyerMax) + '원'),
    resultRow('', ''),
    resultRow('1심 최소 비용', fmtWon(totalMin) + '원 (인지대+송달료)', 'total')
  ];

  var disclaimer = '* 인지대는 민사소송등인지법 제2조 기준. 송달료는 1회 ' + fmtWon(serviceFeePerSend) + '원 x ' + sendsPerParty + '회분 x 당사자수. 변호사 비용은 대한변호사협회 기준 참고 범위이며 실제와 다를 수 있습니다.';

  var smallNote = '';
  if (isSmall) {
    smallNote = '<div style="background:rgba(39,174,96,0.1);border-radius:8px;padding:12px;margin-top:12px;font-size:13px;color:var(--success);font-weight:600">소액사건 (3천만원 이하): 변호사 없이 직접 소송 가능</div>';
  }

  var explainText = '청구금액 ' + fmtWon(amount) + '원 기준 민사소송등인지법 적용. ' +
    (isSmall ? '소액사건(3천만원 이하)은 소액사건심판법에 따라 변호사 없이 직접 소송이 가능합니다. 이행권고결정 제도를 활용하면 더 빠르게 진행할 수 있습니다.' :
    '변호사 비용은 소송 난이도, 지역, 변호사 경력에 따라 크게 달라집니다. 대한법률구조공단(132)에서 무료 법률 상담도 가능합니다.');

  var startCode = 'cl_' + amount + '_' + parties;
  var consultMsg = '소송비용 계산 결과로 상담 요청합니다.\n'
    + '━━━━━━━━━━━━━━\n'
    + '청구금액: ' + fmtWon(amount) + '원\n'
    + '당사자 수: ' + parties + '명\n'
    + '인지대 (1심): ' + fmtWon(stampFee) + '원\n'
    + '인지대 (항소심): ' + fmtWon(appealStamp) + '원\n'
    + '인지대 (상고심): ' + fmtWon(cassationStamp) + '원\n'
    + '송달료: ' + fmtWon(serviceFee) + '원\n'
    + '변호사 비용 범위: ' + fmtWon(lawyerMin) + ' ~ ' + fmtWon(lawyerMax) + '원\n'
    + '1심 최소 비용: ' + fmtWon(totalMin) + '원\n'
    + '━━━━━━━━━━━━━━\n'
    + '소송 절차와 승소 가능성에 대해 알려주세요.';

  document.getElementById('lit-result').innerHTML =
    resultBox(rows, disclaimer, getLawRef('litigationCost')) + smallNote + explanationBox(explainText) + consultButton(consultMsg, startCode);
}
</script>
</body>
</html>
